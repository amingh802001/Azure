<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Earthquakes DB — Mohammad Amin Ghasemi 36185</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="bg-indigo-600 text-white">
    <div class="max-w-5xl mx-auto px-4 py-5 text-center">
      <div class="text-3xl md:text-4xl font-extrabold">Mohammad Amin Ghasemi — 36185</div>
    </div>
  </header>

  <nav class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-4 py-2 flex gap-4 text-sm">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('initdb') }}">Init DB (CSV)</a>
      <a href="{{ url_for('mag_range') }}">Magnitude Range</a>
      <a href="{{ url_for('net_delete') }}">Net Delete</a>
      <a href="{{ url_for('edit_quake') }}">Edit</a>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-6">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="space-y-2 mb-4">
          {% for category, message in messages %}
            <div class="border-l-4 border-green-500 bg-green-50 p-3 text-sm rounded">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
